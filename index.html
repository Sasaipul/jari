<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Escape - Jangan Kena!</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            background: #0a0a19; /* Warna dasar grid */
        }
        
        /* Merapikan UI agar lebih adaptif di HP */
        #ui { position: absolute; top: 15px; left: 15px; pointer-events: none; z-index: 15; }
        .stats { font-size: 20px; font-weight: bold; text-shadow: 0 0 10px rgba(0, 255, 255, 0.5); }
        .high-score { font-size: 14px; color: #ffff00; }
        .hint { font-size: 11px; opacity: 0.7; max-width: 200px; line-height: 1.2; margin-top: 5px; }

        #pauseBtn { 
            position: absolute; top: 15px; right: 15px; 
            background: rgba(0, 255, 255, 0.1); color: #00ffff; 
            border: 1px solid #00ffff; padding: 8px 12px; 
            font-size: 12px; font-weight: bold; border-radius: 5px; 
            cursor: pointer; z-index: 100; /* Z-index tinggi agar di atas canvas */
            backdrop-filter: blur(5px);
        }

        canvas { border: 1px solid #333; cursor: none; display: block; }

        #msg { 
            position: absolute; text-align: center; display: none; 
            background: rgba(0, 0, 0, 0.9); padding: 30px; 
            border-radius: 15px; border: 1px solid #00ffff; z-index: 200; 
            width: 80%; max-width: 300px;
        }
        
        button.main-btn { background: #00ffff; border: none; padding: 12px 25px; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 15px; color: #000; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="stats">Score: <span id="score">0</span></div>
        <div class="high-score">Score Tertinggi: <span id="highScore">0</span></div>
        <div class="hint">Hindari Kotak Merah!</div>
        <div class="hint">Ambil Kotak Kuning untuk Bom!</div>
    </div>

    <div id="msg">
        <h1 id="status" style="margin-top:0; color:#ff4444;">GAME OVER</h1>
        <p>Score Akhir: <span id="finalScore">0</span></p>
        <button class="main-btn" onclick="resetGame()">Main Lagi</button>
    </div>

    <button id="pauseBtn">PAUSE (Esc)</button>

    <canvas id="gameCanvas"></canvas>
    

<script>
    // --- AUDIO SYSTEM (File Lokal) ---
    const bombSound = new Audio('boom.mp3'); // Pastikan nama file sesuai
    bombSound.preload = 'auto'; // Memuat file di awal agar tidak delay saat diputar

    function playBombSound() {
        // Reset durasi ke awal agar bisa diputar berulang kali dengan cepat
        bombSound.currentTime = 0; 
        bombSound.play().catch(e => console.log("Audio play blocked: ", e));
    }

    // --- SETUP AWAL ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const msg = document.getElementById('msg');
    const finalScoreEl = document.getElementById('finalScore');
    const pauseBtn = document.getElementById('pauseBtn');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let highScore = localStorage.getItem('neonHighScore') || 0;
    document.getElementById('highScore').innerText = highScore;

    let player = { x: canvas.width/2, y: canvas.height/2, size: 15, color: '#00ffff' };
    let enemies = [];
    let powerUps = [];
    let particles = [];
    let score = 0;
    let gameOver = false;
    let isPaused = false;
    let enemySpeed = 2;
    let spawnRate = 1000;
    let lastSpawn = 0;
    
    let powerUpTimer = 0;
    let powerUpInterval = 10000;

    function drawGrid() {
        ctx.strokeStyle = 'rgba(0, 255, 255, 0.05)';
        ctx.lineWidth = 1;
        const gridSize = 50;
        for (let x = 0; x < canvas.width; x += gridSize) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }
        for (let y = 0; y < canvas.height; y += gridSize) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }
    }

    // --- LOGIKA TOMBOL PAUSE (MOBILE & DESKTOP) ---
    function togglePause(e) {
        if (e) {
            e.preventDefault();
            e.stopPropagation(); // Mencegah sentuhan tembus ke player
        }
        if (gameOver) return;
        
        isPaused = !isPaused;
        if (isPaused) {
            pauseBtn.innerText = "RESUME (Esc)";
            pauseBtn.style.background = "rgba(255, 255, 0, 0.3)";
            pauseBtn.style.color = "#ffff00";
            pauseBtn.style.borderColor = "#ffff00";
            
            ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.font = "bold 30px Arial";
            ctx.textAlign = "center";
            ctx.fillText("GAME PAUSED", canvas.width/2, canvas.height/2);
        } else {
            pauseBtn.innerText = "PAUSE (Esc)";
            pauseBtn.style.background = "rgba(0, 255, 255, 0.1)";
            pauseBtn.style.color = "#00ffff";
            pauseBtn.style.borderColor = "#00ffff";
            requestAnimationFrame(update);
        }
    }

    // Listener khusus touch agar responsif di HP
    pauseBtn.addEventListener('touchstart', togglePause, { passive: false });
    pauseBtn.addEventListener('click', (e) => {
        if (e.pointerType !== 'touch') togglePause(e);
    });

    // --- KONTROL PLAYER ---
    function movePlayer(clientX, clientY) {
        if (gameOver || isPaused) return;
        let halfSize = player.size / 2;
        player.x = Math.max(halfSize, Math.min(clientX, canvas.width - halfSize));
        player.y = Math.max(halfSize, Math.min(clientY, canvas.height - halfSize));
    }

    window.addEventListener('mousemove', (e) => movePlayer(e.clientX, e.clientY));
    window.addEventListener('touchmove', (e) => {
        e.preventDefault();
        movePlayer(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });

    window.addEventListener('keydown', (e) => { if (e.key === "Escape") togglePause(); });

    // --- LOGIKA GAME ---
    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y; this.color = color;
            this.size = Math.random() * 3 + 1;
            this.speedX = (Math.random() - 0.5) * 8;
            this.speedY = (Math.random() - 0.5) * 8;
            this.alpha = 1;
        }
        update() { this.x += this.speedX; this.y += this.speedY; this.alpha -= 0.02; }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.size, this.size);
            ctx.restore();
        }
    }

    function spawnEnemy() {
        const size = 20;
        let x, y;
        if (Math.random() < 0.5) {
            x = Math.random() < 0.5 ? -size : canvas.width + size;
            y = Math.random() * canvas.height;
        } else {
            x = Math.random() * canvas.width;
            y = Math.random() < 0.5 ? -size : canvas.height + size;
        }
        enemies.push({ x, y, size, speed: enemySpeed + Math.random() });
    }

    function spawnPowerUp() {
        if (powerUps.length === 0) {
            powerUps.push({ 
                x: Math.random() * (canvas.width - 60) + 30, 
                y: Math.random() * (canvas.height - 60) + 30, 
                size: 20 
            });
             // Atur interval berikutnya secara acak antara 10 - 20 detik
            powerUpInterval = 10000 + Math.random() * 5000;
            powerUpTimer = performance.now(); // Reset timer ke waktu saat ini
        }
    }

    function update(time = 0) {
        if (gameOver || isPaused) return;

        // 1. BACKGROUND BARU: Biru Gelap dengan Efek Jejak (rgba)
        ctx.fillStyle = 'rgba(10, 10, 25, 0.7)'; // Warna biru sangat gelap
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. MENGGAMBAR GRID (Latar Belakang)
        ctx.strokeStyle = 'rgba(0, 255, 255, 0.05)'; // Garis cyan sangat tipis
        ctx.lineWidth = 1;
        const gridSize = 50;
        
        for (let x = 0; x < canvas.width; x += gridSize) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, canvas.height);
            ctx.stroke();
        }
        for (let y = 0; y < canvas.height; y += gridSize) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(canvas.width, y);
            ctx.stroke();
        }

        // --- LOGIKA KENAIKAN KECEPATAN SETIAP 5 DETIK ---
        if (!window.lastSpeedUpdate) window.lastSpeedUpdate = time;
        if (time - window.lastSpeedUpdate > 5000) {
            enemySpeed += 0.3; 
            window.lastSpeedUpdate = time;
        }

        // Power-up Timer Logic
        if (powerUps.length === 0) {
            if (powerUpTimer === 0) powerUpTimer = time;
            if (time - powerUpTimer > powerUpInterval) {
                spawnPowerUp();
                powerUpTimer = time;
            }
        } else {
            powerUpTimer = time;
        }

        // Spawn Enemies
        if (time - lastSpawn > spawnRate) {
            spawnEnemy();
            lastSpawn = time;
            if (spawnRate > 350) spawnRate -= 3;
            score++;
            scoreEl.innerText = score;
        }

        // Draw Player
        ctx.shadowBlur = 15; ctx.shadowColor = player.color;
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x - player.size/2, player.y - player.size/2, player.size, player.size);
        ctx.shadowBlur = 0;

        // Particles
        particles.forEach((p, i) => {
            p.update(); p.draw();
            if (p.alpha <= 0) particles.splice(i, 1);
        });

        // Enemies Logic
        enemies.forEach((en, i) => {
            const angle = Math.atan2(player.y - en.y, player.x - en.x);
            en.x += Math.cos(angle) * en.speed;
            en.y += Math.sin(angle) * en.speed;

            ctx.fillStyle = '#ff4444';
            ctx.fillRect(en.x - en.size/2, en.y - en.size/2, en.size, en.size);

            if (Math.hypot(player.x - en.x, player.y - en.y) < (player.size/2 + en.size/2)) endGame();
        });
        

        // Power-Up Logic
        powerUps.forEach((p, i) => {
            ctx.fillStyle = '#ffff00';
            ctx.shadowBlur = 15; ctx.shadowColor = 'yellow';
            ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
            ctx.shadowBlur = 0;

            if (Math.hypot(player.x - p.x, player.y - p.y) < 30) {
                playBombSound(); // Sekarang akan memutar file boom.mp3
                for(let j=0; j<20; j++) particles.push(new Particle(p.x, p.y, '#ffff00'));
                enemies.forEach(en => { for(let k=0; k<5; k++) particles.push(new Particle(en.x, en.y, '#ff4444')); });
                enemies = [];
                powerUps.splice(i, 1);
                score += 5;
                powerUpTimer = performance.now();
                if (navigator.vibrate) navigator.vibrate(50);
            }
        });

        requestAnimationFrame(update);
    }

    function endGame() {
        gameOver = true;
        msg.style.display = 'block';
        finalScoreEl.innerText = score;
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('neonHighScore', highScore);
            document.getElementById('highScore').innerText = highScore;
        }
        if (navigator.vibrate) navigator.vibrate(200);
    }

   function resetGame() {
        // Pancing audio agar aktif (khusus untuk mobile/browser modern)
        bombSound.play();
        bombSound.pause();
        bombSound.currentTime = 0;
        score = 0; scoreEl.innerText = 0;
        enemies = []; powerUps = []; particles = [];
        spawnRate = 1000; 
        enemySpeed = 2; 
        window.lastSpeedUpdate = performance.now(); // Reset timer kecepatan ke waktu sekarang
        gameOver = false; isPaused = false;
        msg.style.display = 'none';
        player.x = canvas.width/2; player.y = canvas.height/2;
        powerUpTimer = performance.now();
        lastSpawn = performance.now(); 
        powerUpInterval = 10000 + Math.random() * 5000; // Minimal 10 detik pertama
        powerUpTimer = performance.now();
        update();
    }

    window.addEventListener('resize', () => {
        const ratioX = player.x / canvas.width;
        const ratioY = player.y / canvas.height;

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        player.x = canvas.width * ratioX;
        player.y = canvas.height * ratioY;

        // Jika sedang pause, gambar ulang biar tidak hitam polos
        if (isPaused || gameOver) {
            ctx.fillStyle = '#0a0a19';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawGrid();
            if(isPaused) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "bold 30px Arial";
                ctx.textAlign = "center";
                ctx.fillText("GAME PAUSED", canvas.width/2, canvas.height/2);
            }
        }
    });

    update();
</script>
</body>
</html>
